name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      # draw.io desktop is not available on the runner, so the end-to-end
      # conversion tests skip themselves; the parsing/geometry tests still run.
      - run: ruff check .
      - run: pytest -q
